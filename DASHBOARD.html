<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC SCHOOL ELECTION PORTAL</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .dashboard-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 800px;
      width: 90%;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    p.subtitle {
      color: #7f8c8d;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .house-card {
      text-decoration: none;
      padding: 30px 20px;
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .house-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    /* Unique Theme Colors for Each House */
    .centaur {
      background: linear-gradient(135deg, #9b1c1c, #d32f2f);
    }
    .pegasus {
      background: linear-gradient(135deg, #0d47a1, #1976d2);
    }
    .phoenix {
      background: linear-gradient(135deg, #e65100, #f57c00);
    }
    .unicorn {
      background: linear-gradient(135deg, #4a148c, #7b1fa2);
    }

    .house-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      color: #bdc3c7;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <h1>OFFICIAL ELECTION PORTAL</h1>
    <p class="subtitle">Please select your assigned House to cast your ballot</p>

    <div class="grid-container">
      <a href="CENTAUR.html" target="_blank" class="house-card centaur">
        <div class="house-icon">🏹</div>
        CENTAUR
      </a>

      <a href="PEGASUS.html" target="_blank" class="house-card pegasus">
        <div class="house-icon">🐴</div>
        PEGASUS
      </a>

      <a href="PHOENIX.html" target="_blank" class="house-card phoenix">
        <div class="house-icon">🔥</div>
        PHOENIX
      </a>

      <a href="UNICORN.html" target="_blank" class="house-card unicorn">
        <div class="house-icon">🦄</div>
        UNICORN
      </a>
    </div>

    <footer>Secure School Voting Framework</footer>
  </div>

</body>
</html>
